name: Process Malware Packages

on:
  schedule:
    # Run once a week (Sunday 00:00 UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Process OSSF malicious-packages
        run: npm run process

      - name: Validate output (fail if no packages produced)
        run: |
          total=$(cat malicious/*.jsonl 2>/dev/null | wc -l)
          if [ "$total" -eq 0 ]; then
            echo "ERROR: No packages produced - all JSONL files are empty. Failing build."
            exit 1
          fi
          echo "Produced $total packages - validation passed"

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add malicious/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update malware packages $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
